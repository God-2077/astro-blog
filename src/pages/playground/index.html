<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playground</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #555;
            --accent: #4f6ef7;
            --accent-hover: #3b54e0;
            --border: #e8ecf1;
            --radius: 10px;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.06);
            --shadow-hover: 0 4px 14px rgba(0, 0, 0, 0.08);
            --max-width: 640px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 24px 16px 48px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            width: 100%;
            max-width: var(--max-width);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text);
            margin-bottom: 20px;
            padding-left: 4px;
        }

        ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        li {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            transition: box-shadow 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
        }

        li:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-1px);
            border-color: #d5dbe4;
        }

        li:active {
            transform: scale(0.995);
            transition: transform 0.1s ease;
        }

        li a {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 6px 10px;
            padding: 15px 18px;
            text-decoration: none;
            color: var(--text);
            font-size: 0.95rem;
            line-height: 1.5;
            border-radius: var(--radius);
            -webkit-tap-highlight-color: transparent;
            outline-offset: -2px;
        }

        li a:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
            border-radius: var(--radius);
        }

        .item-number {
            flex-shrink: 0;
            font-weight: 600;
            color: var(--accent);
            font-size: 0.85rem;
            min-width: 1.2em;
        }

        .item-title {
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
        }

        .item-desc {
            color: var(--text-secondary);
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1 1 auto;
            min-width: 0;
        }

        /* 移动端适配 */
        @media (max-width: 480px) {
            body {
                padding: 16px 12px 36px;
            }

            h1 {
                font-size: 1.3rem;
                margin-bottom: 14px;
            }

            ul {
                gap: 8px;
            }

            li a {
                padding: 13px 14px;
                font-size: 0.9rem;
                flex-direction: column;
                gap: 2px 8px;
            }

            .item-desc {
                white-space: normal;
                font-size: 0.8rem;
            }

            .item-title {
                white-space: normal;
            }
        }

        @media (min-width: 481px) and (max-width: 768px) {
            body {
                padding: 20px 16px 40px;
            }

            li a {
                padding: 14px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>List Playground</h1>
        <ul>
            <li>
                <a href="/playground/PityCalc_Sim/">
                    <span class="item-number">1.</span>
                    <span class="item-title">抽卡概率计算器</span>
                    <span class="item-desc">软/硬保底模拟、期望次数统计</span>
                </a>
            </li>
        </ul>
    </div>
</body>
</html>
